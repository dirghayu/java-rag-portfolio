spring:
  application:
    name: document-qa-api
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

server:
  port: 8080

app:
  gemini:
    api-key: ${GEMINI_API_KEY}
    model: gemini-1.5-flash
    embedding-model: text-embedding-004
  weaviate:
    host: ${WEAVIATE_HOST}
    api-key: ${WEAVIATE_API_KEY}
    collection: Documents
  rag:
    chunk-size: 500
    chunk-overlap: 50
    max-results: 5
